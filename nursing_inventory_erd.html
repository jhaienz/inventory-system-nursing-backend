
<style>
#erd svg { width: 100%; height: auto; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f5f4f0',
    primaryBorderColor: dark ? '#4a4a46' : '#c8c6bc',
    attributeBackgroundColorEven: dark ? '#222220' : '#fafaf8',
    attributeBackgroundColorOdd: dark ? '#2e2e2c' : '#f0efeb',
  },
});

const diagram = `erDiagram
  admins {
    uuid id PK
    string username
    string password_hash
    string full_name
    timestamp created_at
  }

  categories {
    uuid id PK
    string name
    string description
    string color_tag
    uuid created_by FK
    timestamp created_at
  }

  items {
    uuid id PK
    uuid category_id FK
    uuid created_by FK
    string name
    string description
    enum item_type
    int total_quantity
    int available_quantity
    string unit_of_measure
    boolean is_active
    timestamp created_at
    timestamp updated_at
  }

  item_units {
    uuid id PK
    uuid item_id FK
    string unit_label
    enum status
    timestamp created_at
  }

  borrowers {
    uuid id PK
    string username
    string pin_hash
    string full_name
    string department
    string email
    boolean is_active
    timestamp created_at
  }

  loan_requests {
    uuid id PK
    uuid borrower_id FK
    uuid item_id FK
    uuid item_unit_id FK
    uuid reviewed_by FK
    int quantity
    enum status
    date week_start
    date week_end
    date returned_at
    string admin_notes
    timestamp created_at
    timestamp updated_at
  }

  penalties {
    uuid id PK
    uuid loan_request_id FK
    uuid borrower_id FK
    uuid cleared_by FK
    string reason
    enum status
    timestamp issued_at
    timestamp cleared_at
  }

  audit_logs {
    uuid id PK
    uuid admin_id FK
    string action
    string table_name
    uuid record_id
    jsonb changes
    timestamp created_at
  }

  admins ||--o{ categories : "creates"
  admins ||--o{ items : "creates"
  admins ||--o{ loan_requests : "reviews"
  admins ||--o{ penalties : "clears"
  admins ||--o{ audit_logs : "triggers"
  categories ||--o{ items : "groups"
  items ||--o{ item_units : "has units"
  items ||--o{ loan_requests : "requested in"
  item_units ||--o{ loan_requests : "assigned to"
  borrowers ||--o{ loan_requests : "submits"
  borrowers ||--o{ penalties : "receives"
  loan_requests ||--o{ penalties : "generates"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
